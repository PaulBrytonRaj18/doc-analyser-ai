version: "3.9"

services:
  api:
    build: .
    container_name: document-analyzer
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - LOG_LEVEL=INFO
    restart: unless-stopped
    volumes:
      - ./:/app  # Mount for hot-reload in development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
