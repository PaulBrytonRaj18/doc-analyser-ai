name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run pytest with coverage (skip OCR tests needing system deps)
        working-directory: backend
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=70 --ignore=tests/unit/test_ocr.py --ignore=tests/unit/test_edge_cases.py::TestOCREdgeCases

      - name: Run ruff linter
        working-directory: backend
        run: ruff check . --exclude migrations/

      # mypy disabled due to internal errors in dev environment
      # - name: Run mypy type checking
      #   working-directory: backend
      #   run: mypy .